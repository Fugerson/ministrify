<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministrify — Технічні роботи</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 480px;
        }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }
        .icon svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            opacity: 0.85;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .small {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 24px;
        }
        .dots span {
            animation: blink 1.4s infinite;
            font-size: 24px;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
            </svg>
        </div>
        <h1>Технічні роботи</h1>
        <p>Ми оновлюємо Ministrify для покращення сервісу<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
        <p>Зазвичай це займає менше хвилини.</p>
        <p class="small">Сторінка оновиться автоматично</p>
    </div>
    <script>
        setTimeout(function check() {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
                .then(function(r) { if (r.ok) window.location.reload(); else setTimeout(check, 3000); })
                .catch(function() { setTimeout(check, 3000); });
        }, 5000);
    </script>
</body>
</html>
