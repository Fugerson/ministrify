name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  deploy:
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 49.12.100.17
          port: 2222
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd /var/www/ministrify

            # Backup before deploy
            echo "Running backup..."
            bash backup.sh

            # Deploy
            echo "Starting deployment..."
            bash deploy.sh

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ALERT_TELEGRAM_CHAT_ID }}
          token: ${{ secrets.ALERT_TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *Deploy successful*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
            [View commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ALERT_TELEGRAM_CHAT_ID }}
          token: ${{ secrets.ALERT_TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Deploy FAILED*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
            [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
